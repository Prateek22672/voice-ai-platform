# Voice AI Platform — full local stack.
#   cp .env.example .env  (fill keys)  ->  docker compose up --build
# Profiles:
#   default          : core pipeline (browser voice agent) — Phase 1
#   --profile telephony : + Asterisk + telephony-service    — Phase 2
#   --profile monitoring: + Prometheus + Grafana
#   --profile gpu    : GPU-enabled stt/tts variants (see overrides below)
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
      POSTGRES_DB: voiceai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U voice"], interval: 5s, retries: 10 }

  redis:
    image: redis:7
    ports: ["6379:6379"]

  nats:
    image: nats:2.10
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./infra/nats/nats.conf:/etc/nats/nats.conf
      - natsdata:/data
    ports: ["4222:4222", "8222:8222"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes: [ "miniodata:/data" ]
    ports: ["9000:9000", "9001:9001"]

  stt-service:
    build: { context: ., dockerfile: services/stt-service/Dockerfile }
    environment:
      STT_BACKEND: ${STT_BACKEND:-whisper}          # whisper (self-hosted) | openai | groq
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-gpt-4o-transcribe}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_STT_MODEL: ${GROQ_STT_MODEL:-whisper-large-v3}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
      WHISPER_COMPUTE: ${WHISPER_COMPUTE:-default}
      STT_SILENCE_FLUSH_S: ${STT_SILENCE_FLUSH_S:-0.9}
      STT_PARTIAL_INTERVAL_S: ${STT_PARTIAL_INTERVAL_S:-1.0}
      STT_SPEECH_START_S: ${STT_SPEECH_START_S:-0.35}   # speech this long = barge-in trigger; raise to 0.5 if echoey
      STT_MIN_SPEECH_S: ${STT_MIN_SPEECH_S:-0.45}
      STT_PREPROCESS: ${STT_PREPROCESS:-1}        # clean audio before STT (DC/rumble + normalize)
      STT_POSTPROCESS: ${STT_POSTPROCESS:-1}      # strip Whisper hallucination phrases + repeats
      STT_PROMPT: ${STT_PROMPT:-}                 # optional domain vocab hint for accuracy
      STT_DEBUG_DUMP: ${STT_DEBUG_DUMP:-0}
      STT_LANG: ${STT_LANG:-}
      VOICE_DIR: /app/voices
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
      HF_TOKEN: ${HF_TOKEN:-}
    ports: ["8001:8001"]
    volumes: [ "hfcache:/root/.cache", "./voices:/app/voices" ]   # models + debug WAV dumps
    # GPU: uncomment for CUDA
    # deploy: { resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } } }

  tts-service:
    build:
      context: .
      dockerfile: services/tts-service/Dockerfile
      args: { TTS_EXTRA: "${TTS_EXTRA:-}" }   # e.g. "kokoro soundfile" for real voices
    environment:
      TTS_BACKEND: ${TTS_BACKEND:-espeak}     # espeak=plumbing test; kokoro/f5tts=real quality
      KOKORO_SPEED: ${KOKORO_SPEED:-0.9}      # <1.0 = slower/calmer voice
      KOKORO_VOICE: ${KOKORO_VOICE:-af_heart}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}   # premium tier: TTS_BACKEND=elevenlabs
      ELEVEN_MODEL: ${ELEVEN_MODEL:-eleven_turbo_v2_5}
      ELEVEN_VOICE: ${ELEVEN_VOICE:-21m00Tcm4TlvDq8ikWAM}
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}   # guards "set live agent voice" in Voice Studio
    ports: ["8002:8002"]
    volumes: [ "hfcache:/root/.cache", "./voices:/app/voices" ]
    # deploy: { resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } } }

  conversation-service:
    build: { context: ., dockerfile: services/conversation-service/Dockerfile }
    environment:
      REDIS_URL: redis://redis:6379/0
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-300}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
      VOICE_DIR: /app/voices                       # persists llm_usage.json across rebuilds
    ports: ["8003:8003"]
    volumes: [ "./voices:/app/voices" ]
    depends_on: [redis]

  websocket-gateway:
    build: { context: ., dockerfile: services/websocket-gateway/Dockerfile }
    environment:
      STT_WS: ws://stt-service:8001/v1/stt/stream
      TTS_WS: ws://tts-service:8002/v1/tts/stream
      CONV_URL: http://conversation-service:8003
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
      BARGE_IN: ${BARGE_IN:-1}                    # 1 = user can interrupt the agent mid-sentence
      FILLER_ENABLED: ${FILLER_ENABLED:-1}        # instant "Mm-hmm" acknowledgements
    ports: ["8000:8000"]
    depends_on: [stt-service, tts-service, conversation-service]

  api-gateway:
    build: { context: ., dockerfile: services/api-gateway/Dockerfile }
    environment:
      POSTGRES_URL: postgresql://voice:voice@postgres:5432/voiceai
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-300}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ALLOW_ADMIN: ${ALLOW_ADMIN:-true}
      TEL_URL: http://host.docker.internal:8004   # telephony-service runs on the HOST network
    extra_hosts: [ "host.docker.internal:host-gateway" ]
    ports: ["8090:8080"]   # host 8090 (8080 is taken by another app on this VPS)
    depends_on: { postgres: { condition: service_healthy } }

  recording-service:
    build: { context: ., dockerfile: services/recording-service/Dockerfile }
    environment:
      POSTGRES_URL: postgresql://voice:voice@postgres:5432/voiceai
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
    ports: ["8005:8005"]
    depends_on: [minio, postgres]

  analytics-service:
    build: { context: ., dockerfile: services/analytics-service/Dockerfile }
    environment:
      POSTGRES_URL: postgresql://voice:voice@postgres:5432/voiceai
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
    ports: ["8006:8006"]
    depends_on: { postgres: { condition: service_healthy } }

  dashboard:
    build: { context: ., dockerfile: dashboard/Dockerfile }
    ports: ["3000:3000"]

  # ---- reverse proxy + Cloudflare Tunnel (public HTTPS at voice.<domain>) ----
  caddy:
    image: caddy:2
    volumes: [ "./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" ]
    restart: unless-stopped
    depends_on: [dashboard, api-gateway, stt-service, tts-service, websocket-gateway]

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on: [caddy]

  # ---------------- telephony profile (Phase 2) ----------------
  asterisk:
    profiles: [telephony]
    build: { context: ., dockerfile: services/telephony-service/Dockerfile.asterisk }
    network_mode: host          # simplest for SIP/RTP; or map 5060/udp + RTP range
    restart: unless-stopped
    environment:
      SIP_TRUNK_USER: ${SIP_TRUNK_USER:-}
      SIP_TRUNK_PASS: ${SIP_TRUNK_PASS:-}
      SIP_DID_NUMBER: ${SIP_DID_NUMBER:-}   # caller ID (your purchased Telnyx number)
      PUBLIC_IP: ${PUBLIC_IP:-}             # VPS public IP for SDP (auto-detected if empty)

  telephony-service:
    profiles: [telephony]
    build: { context: ., dockerfile: services/telephony-service/Dockerfile }
    restart: unless-stopped
    # HOST network like asterisk: RTP (UDP) must flow directly between asterisk and this
    # bridge — Docker's UDP port-proxy silently broke the media path (silent calls).
    network_mode: host
    environment:
      ARI_URL: http://127.0.0.1:8088                          # asterisk, same host network
      GW_WS: ws://127.0.0.1:8000/v1/agent/stream              # websocket-gateway's published port
      SIP_DID_NUMBER: ${SIP_DID_NUMBER:-}
      EXTERNAL_MEDIA_HOST: ${EXTERNAL_MEDIA_HOST:-127.0.0.1}  # asterisk -> our RTP socket, both on host
      VOICE_DIR: /app/voices                                  # persists call transcripts
      DEV_API_KEY: ${DEV_API_KEY:-dev-test-key}
    volumes: [ "./voices:/app/voices" ]

  # ---------------- monitoring profile ----------------
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus
    volumes: [ "./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml" ]
    ports: ["9090:9090"]

  grafana:
    profiles: [monitoring]
    image: grafana/grafana
    ports: ["3001:3000"]
    environment: { GF_SECURITY_ADMIN_PASSWORD: admin }

volumes:
  pgdata: {}
  natsdata: {}
  miniodata: {}
  hfcache: {}

; PJSIP config — SIP trunk (Telnyx) + local softphone for testing
[global]
type=global
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Advertise the PUBLIC address in SIP/SDP — without this, Telnyx is told to send the call
; audio to a private/wrong address and the call is silent both ways.
external_media_address=CHANGE_ME_PUBLIC_IP
external_signaling_address=CHANGE_ME_PUBLIC_IP
local_net=127.0.0.0/8
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

; ---- Telnyx trunk (credentials injected from .env by entrypoint.sh at container start) ----
[telnyx-trunk]
type=endpoint
context=inbound
disallow=all
allow=ulaw,alaw,slin16
outbound_auth=telnyx-auth
aors=telnyx-aor
from_domain=sip.telnyx.com
from_user=CHANGE_ME_DID          ; caller ID = your purchased Telnyx number (E.164)
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[telnyx-auth]
type=auth
auth_type=userpass
username=CHANGE_ME_SIP_USER
password=CHANGE_ME_SIP_PASS

[telnyx-aor]
type=aor
contact=sip:sip.telnyx.com

[telnyx-identify]
type=identify
endpoint=telnyx-trunk
match=sip.telnyx.com

; ---- local softphone for Phase 0 testing (register any SIP client, $0 cost) ----
[softphone]
type=endpoint
context=inbound
disallow=all
allow=ulaw,slin16
auth=softphone-auth
aors=softphone-aor

[softphone-auth]
type=auth
auth_type=userpass
username=softphone
password=test1234

[softphone-aor]
type=aor
max_contacts=1

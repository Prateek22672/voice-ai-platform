<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice AI — Talk to the Agent</title>
<style>
  :root{--card:rgba(255,255,255,.03);--line:rgba(255,255,255,.1);--ink:#fff;
        --mut:rgba(255,255,255,.55);--you:#8fe3a8;--agent:#dfe7ff;--rec:#e5484d;--ok:#3fb950;--amber:#e3b341}
  *{box-sizing:border-box}
  body{font-family:system-ui,"Segoe UI",Roboto,sans-serif;max-width:780px;margin:0 auto;
       padding:44px 20px 90px;background:#000;color:var(--ink);line-height:1.55}
  h2{margin:0 0 6px;font-size:30px;letter-spacing:-.02em;font-weight:700}
  .sub{color:var(--mut);margin:0 0 24px;font-size:14px;max-width:62ch}
  a.back{color:var(--mut);text-decoration:none;font-size:13px;display:inline-block;margin-bottom:20px}
  a.back:hover{color:#fff}
  label{display:block;font-size:11px;color:var(--mut);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.08em}
  input,textarea{width:100%;background:rgba(255,255,255,.04);color:var(--ink);border:1px solid var(--line);
                 border-radius:12px;padding:11px 14px;font-family:inherit;font-size:14px}
  input:focus,textarea:focus{outline:2px solid rgba(255,255,255,.28);outline-offset:1px}
  button{padding:12px 28px;font-size:15px;border-radius:9999px;border:0;cursor:pointer;
         background:#fff;color:#000;font-weight:600;transition:background .2s}
  button:hover{background:#e8e8e8}
  button.stop{background:var(--rec);color:#fff}
  /* live status banner */
  .statusbar{display:flex;align-items:center;gap:10px;margin:16px 0;padding:14px 16px;
             background:var(--card);border:1px solid var(--line);border-radius:16px;font-size:14px;
             -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .statusdot{width:11px;height:11px;border-radius:50%;background:var(--mut);flex-shrink:0}
  .statusbar.listening .statusdot{background:var(--ok);animation:pulse 1.1s infinite}
  .statusbar.speaking .statusdot{background:#fff;animation:pulse 1.1s infinite}
  .statusbar.thinking .statusdot{background:var(--amber);animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  @media(prefers-reduced-motion:reduce){.statusdot{animation:none!important}}
  .statusbar .level{margin-left:auto;height:8px;width:120px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
  .statusbar .level i{display:block;height:100%;width:0;background:#fff;transition:width .07s}
  #log{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:18px;
       padding:18px;height:360px;overflow-y:auto;font-size:14.5px;line-height:1.7;
       -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .you{color:var(--you)} .agent{color:var(--agent)} .sys{color:var(--mut);font-size:12px}
  .partial{color:var(--mut);font-style:italic}
</style>
</head>
<body>
  <a class="back" href="/">← Overview</a>
  <h2>Talk to the Agent</h2>
  <p class="sub">Live conversation: your speech is transcribed by <b>Whisper</b>, answered by <b>Groq</b>,
     and spoken back with <b>Kokoro</b>. Speak naturally, then <b>pause</b> when you finish — that's how
     the agent knows it's your turn.</p>

  <label>Gateway WS URL</label>
  <input id="wsurl" value="ws://localhost:8000/v1/agent/stream">
  <script>document.getElementById("wsurl").value = "ws://" + location.hostname + ":8000/v1/agent/stream";</script>
  <label>Agent system prompt</label>
  <textarea id="prompt" rows="3">You are a friendly interview agent. Ask the candidate one short question at a time about their software experience. Keep every reply under two sentences.</textarea>
  <p><button id="btn">Start Session</button></p>

  <div class="statusbar" id="statusbar">
    <span class="statusdot"></span>
    <span id="statustext">Idle — press Start, allow the mic, and speak.</span>
    <span class="level"><i id="level"></i></span>
  </div>

  <div id="log"></div>

<script>
"use strict";
var ws, ctx, srcNode, proc, stream;
var IN_RATE = 16000, TTS_RATE = 24000, nextPlayTime = 0, agentPlaying = false, playEndTimer = null;
var agentActive = false;   // server says it's the agent's turn (mic muted)
function micMuted(){ return agentActive || agentPlaying; }

var logEl = document.getElementById("log");
var bar = document.getElementById("statusbar");
var statustext = document.getElementById("statustext");
var levelEl = document.getElementById("level");

function log(cls, msg){ var d=document.createElement("div"); d.className=cls; d.textContent=msg;
  logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight; }
// live transcription: a single updating line while you speak, committed when you pause
var partialEl = null;
function showPartial(text){
  if(!partialEl){ partialEl=document.createElement("div"); partialEl.className="partial"; logEl.appendChild(partialEl); }
  partialEl.textContent = "You: " + text + " …";
  logEl.scrollTop = logEl.scrollHeight;
}
function commitPartial(text){
  if(partialEl){ partialEl.remove(); partialEl=null; }
  log("you", "You: " + text);
}
function setState(state, text){
  bar.className = "statusbar " + (state||"");
  statustext.textContent = text;
}

// ---- resample any input rate -> 16k (browsers often ignore a forced 16k context) ----
// Average each window (box low-pass) instead of picking one sample, so downsampling
// 48k/44.1k -> 16k doesn't alias/distort the speech Whisper has to read.
function downsampleTo16k(f32, inRate){
  if (inRate === 16000) return f32;
  var ratio = inRate / 16000;
  var outLen = Math.floor(f32.length / ratio);
  var out = new Float32Array(outLen);
  for (var i=0;i<outLen;i++){
    var start = Math.floor(i*ratio), end = Math.floor((i+1)*ratio);
    var sum = 0, n = 0;
    for (var j=start;j<end && j<f32.length;j++){ sum += f32[j]; n++; }
    out[i] = n ? sum/n : 0;
  }
  return out;
}

// ---- gapless playback at the true TTS rate (fixes 2x-fast / robotic audio) ----
function enqueuePcm(arrbuf){
  var i16 = new Int16Array(arrbuf);
  var f32 = new Float32Array(i16.length);
  for (var i=0;i<i16.length;i++) f32[i] = i16[i]/32768;
  var buf = ctx.createBuffer(1, f32.length, TTS_RATE);   // declare the REAL rate; ctx resamples
  buf.copyToChannel(f32, 0);
  var s = ctx.createBufferSource();
  s.buffer = buf; s.connect(ctx.destination);
  var now = ctx.currentTime;
  if (nextPlayTime < now + 0.06) nextPlayTime = now + 0.06;
  s.start(nextPlayTime);
  nextPlayTime += buf.duration;
  agentPlaying = true;
  setState("speaking", "🗣️ Agent speaking… (mic paused)");
  if (playEndTimer) clearTimeout(playEndTimer);
  var msLeft = (nextPlayTime - now) * 1000 + 250;   // small tail so the echo fully settles
  playEndTimer = setTimeout(function(){
    agentPlaying = false;
    if (!agentActive) setState("listening","🎙️ Your turn — speak now");
  }, msLeft);
}

async function start(){
  ctx = new AudioContext();                 // let the browser pick its native rate
  IN_RATE = ctx.sampleRate;
  nextPlayTime = 0;
  stream = await navigator.mediaDevices.getUserMedia({ audio: {
    channelCount:1, echoCancellation:true, noiseSuppression:true, autoGainControl:true } });

  ws = new WebSocket(document.getElementById("wsurl").value);
  ws.binaryType = "arraybuffer";
  ws.onopen = function(){
    log("sys","connected");
    ws.send(JSON.stringify({ event:"start", system_prompt: document.getElementById("prompt").value }));
    setState("listening","🎙️ Listening — speak now");
    srcNode = ctx.createMediaStreamSource(stream);
    proc = ctx.createScriptProcessor(4096, 1, 1);
    proc.onaudioprocess = function(e){
      // half-duplex: don't capture while the agent is speaking (kills echo / self-transcription)
      if (micMuted()){ levelEl.style.width = "0"; return; }
      var f32 = e.inputBuffer.getChannelData(0);
      // mic level meter
      var peak=0; for (var k=0;k<f32.length;k++){ var a=Math.abs(f32[k]); if(a>peak)peak=a; }
      levelEl.style.width = Math.min(100, peak*160) + "%";
      // resample to 16k and send
      var ds = downsampleTo16k(f32, IN_RATE);
      var i16 = new Int16Array(ds.length);
      for (var j=0;j<ds.length;j++) i16[j] = Math.max(-1,Math.min(1,ds[j]))*32767;
      if (ws.readyState === 1) ws.send(i16.buffer);
    };
    srcNode.connect(proc); proc.connect(ctx.destination);
  };
  ws.onmessage = function(ev){
    if (typeof ev.data === "string"){
      var d = JSON.parse(ev.data);
      if (d.type === "ready") log("sys","session "+d.session_id);
      else if (d.type === "state"){
        if (d.state === "agent"){ agentActive = true; setState("speaking","🗣️ Agent speaking… (mic paused — please wait)"); }
        else { agentActive = false; if(!agentPlaying) setState("listening","🎙️ Your turn — speak now"); }
      }
      else if (d.type === "partial_transcript"){ showPartial(d.text); }
      else if (d.type === "transcript"){ commitPartial(d.text); setState("thinking","✍️ Heard you — the agent is thinking…"); }
      else if (d.type === "agent_text") log("agent","Agent: "+d.text);
      else if (d.type === "audio_done"){ TTS_RATE = d.sample_rate || 24000; }
      else if (d.type === "turn_done"){ if(!agentPlaying) setState("listening","🎙️ Listening — speak now"); }
      else if (d.type === "error") log("sys","ERROR: "+d.error);
    } else {
      enqueuePcm(ev.data);
    }
  };
  ws.onclose = function(){ log("sys","disconnected"); setState("","Idle."); };
  document.getElementById("btn").textContent = "Stop";
  document.getElementById("btn").className = "stop";
}
function stop(){
  try{ if(ws){ ws.send(JSON.stringify({event:"close"})); ws.close(); } }catch(e){}
  if(proc) proc.disconnect(); if(srcNode) srcNode.disconnect();
  if(stream) stream.getTracks().forEach(function(t){t.stop();});
  if(ctx) ctx.close();
  levelEl.style.width="0";
  setState("","Idle — press Start to talk again.");
  document.getElementById("btn").textContent = "Start Session";
  document.getElementById("btn").className = "";
}
document.getElementById("btn").onclick = function(){
  document.getElementById("btn").textContent.indexOf("Start")===0 ? start() : stop();
};
</script>
</body>
</html>
